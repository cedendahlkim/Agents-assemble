services:
  triage:
    build:
      context: .
      dockerfile: Dockerfile.node
    container_name: gracestack-triage
    restart: unless-stopped
    command: ["node", "--import", "tsx", "agents/triage/index.ts"]
    env_file: .env
    expose:
      - "10020"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:10020/health').then(r=>{if(!r.ok)throw 1})"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  memory:
    build:
      context: .
      dockerfile: Dockerfile.node
    container_name: gracestack-memory
    restart: unless-stopped
    command: ["node", "--import", "tsx", "agents/memory/index.ts"]
    env_file: .env
    expose:
      - "10021"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:10021/health').then(r=>{if(!r.ok)throw 1})"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  fhir-agent:
    build:
      context: .
      dockerfile: Dockerfile.node
    container_name: gracestack-fhir
    restart: unless-stopped
    command: ["node", "--import", "tsx", "agents/fhir/index.ts"]
    env_file: .env
    expose:
      - "10028"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:10028/health').then(r=>{if(!r.ok)throw 1})"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  orchestration:
    build:
      context: .
      dockerfile: Dockerfile.node
    container_name: gracestack-orchestration
    restart: unless-stopped
    command: ["node", "--import", "tsx", "orchestration/cascade.ts"]
    env_file: .env
    environment:
      - TRIAGE_AGENT_URL=http://triage:10020
      - MEMORY_AGENT_URL=http://memory:10021
      - FHIR_AGENT_URL=http://fhir-agent:10028
    expose:
      - "10030"
    depends_on:
      triage:
        condition: service_healthy
      memory:
        condition: service_healthy
      fhir-agent:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:10030/health').then(r=>{if(!r.ok)throw 1})"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  ui:
    build:
      context: ./ui
      dockerfile: Dockerfile
    container_name: gracestack-ai-ui
    restart: unless-stopped
    ports:
      - "10080:80"
    depends_on:
      orchestration:
        condition: service_healthy
